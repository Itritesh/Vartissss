[build]
  publish = "."

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# ── Clean URL Redirects (removes .html from all pages) ──────────────────────
# Redirect any direct .html access → clean URL (301 permanent)
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

[[redirects]]
  from = "/about.html"
  to   = "/about"
  status = 301

[[redirects]]
  from = "/work.html"
  to   = "/work"
  status = 301

[[redirects]]
  from = "/services.html"
  to   = "/services"
  status = 301

[[redirects]]
  from = "/team.html"
  to   = "/team"
  status = 301

[[redirects]]
  from = "/contact.html"
  to   = "/contact"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to   = "/privacy-policy"
  status = 301

[[redirects]]
  from = "/terms.html"
  to   = "/terms"
  status = 301

# ── Serve clean URLs → actual .html files (200 rewrite) ─────────────────────
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/work"
  to   = "/work.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/team"
  to   = "/team.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to   = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200
